name: Apply interactive-buttons fix to main

on:
  push:
    branches: ["copilot/fix-interactive-buttons-issue"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch fixed index.html from triggering branch
        run: |
          git fetch origin ${{ github.ref_name }}
          git checkout FETCH_HEAD -- index.html

      - name: Commit and push to main (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --staged --quiet && echo "Nothing to update (already applied)" || \
            (git commit -m "Fix interactive nav buttons: relative anchors, JS error isolation, smooth scroll" && \
             git push origin main)
