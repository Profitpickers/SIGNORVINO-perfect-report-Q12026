name: Fix nav links on main

on:
  push:
    branches: ["copilot/fix-interactive-buttons-issue"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply nav anchor fix
        run: |
          sed -i 's|href="https://8080-ijz1oo3x3dv58jbyetsqa-c28d4848\.us1\.manus\.computer/#|href="#|g' index.html

      - name: Commit and push to main (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "Nothing to fix (already applied)" || \
            (git add index.html && \
             git commit -m "Fix nav buttons: replace dev-server URLs with relative anchors" && \
             git push origin main)
