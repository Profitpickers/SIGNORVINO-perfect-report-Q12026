name: Apply interactive-buttons fix to main

on:
  push:
    branches: ["copilot/fix-interactive-buttons-issue"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy fixed index.html from feature branch to main
        run: |
          git checkout copilot/fix-interactive-buttons-issue -- index.html

      - name: Switch to main and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git checkout main
          git stash pop
          git diff --quiet && echo "Nothing to update (already applied)" || \
            (git add index.html && \
             git commit -m "Fix interactive nav buttons: relative anchors, JS error isolation, smooth scroll" && \
             git push origin main)
